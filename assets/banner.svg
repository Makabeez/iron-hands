<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Iron Hands — personal trading circuit breaker">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#181320"/>
      <stop offset="60%" stop-color="#0b0b0e"/>
      <stop offset="100%" stop-color="#070709"/>
    </radialGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3b3b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff3b3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#836ef9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#836ef9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#836ef9" stop-opacity="0"/>
    </linearGradient>
    <pattern id="hatch" width="24" height="24" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="1" height="24" fill="#ffffff" opacity="0.02"/>
    </pattern>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="300" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#hatch)"/>

    <!-- sweeping purple scanline -->
    <rect x="-260" y="0" width="260" height="300" fill="url(#scan)" opacity="0.9">
      <animate attributeName="x" values="-260;1200" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- pulsing red glow behind title -->
    <ellipse cx="600" cy="150" rx="360" ry="120" fill="url(#pulse)">
      <animate attributeName="opacity" values="0.12;0.4;0.12" dur="3.2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- decorative animated countdown ring, left -->
    <g transform="translate(150,150)">
      <circle r="70" stroke="#26262e" stroke-width="6"/>
      <circle r="70" stroke="#ff3b3b" stroke-width="6" stroke-linecap="round"
              stroke-dasharray="440" stroke-dashoffset="110" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" values="440;60" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="55" fill="#0c0c10" stroke="#ff3b3b" stroke-width="1" opacity="0.4"/>
      <circle cx="0" cy="-2" r="5" fill="#ff3b3b">
        <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="700"
            font-size="13" letter-spacing="3" fill="#ff5a5a">LOCKED</text>
    </g>

    <!-- decorative ring, right (mirror) -->
    <g transform="translate(1050,150)">
      <circle r="70" stroke="#26262e" stroke-width="6"/>
      <circle r="70" stroke="#22e07a" stroke-width="6" stroke-linecap="round"
              stroke-dasharray="440" stroke-dashoffset="330" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" values="330;440;330" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle r="55" fill="#0c0c10" stroke="#22e07a" stroke-width="1" opacity="0.3"/>
      <path d="M-16 0 l10 12 l22 -26" stroke="#22e07a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    </g>

    <!-- title block -->
    <text x="600" y="118" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="700"
          font-size="16" letter-spacing="7" fill="#836ef9">⛒ PERSONAL TRADING CIRCUIT BREAKER</text>

    <text x="600" y="196" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700"
          font-size="76" letter-spacing="3" fill="#ededf0">IRON HANDS</text>

    <!-- switch-throw underline -->
    <rect x="484" y="214" width="232" height="4" fill="#2a2a30"/>
    <rect x="484" y="214" width="60" height="4" fill="#836ef9">
      <animate attributeName="width" values="0;232;232;0" keyTimes="0;0.45;0.8;1" dur="5s" repeatCount="indefinite"/>
    </rect>

    <text x="600" y="256" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="21" fill="#b9b9c0">
      lock yourself out — <tspan fill="#22e07a" font-weight="700">extend anytime</tspan>, <tspan fill="#ff3b3b" font-weight="700">shorten never</tspan>
    </text>

    <rect x="1" y="1" width="1198" height="298" rx="16" fill="none" stroke="#33333c" stroke-width="2"/>
  </g>
</svg>
